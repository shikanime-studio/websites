jobs:
  build:
    name: Build
    needs:
      - check
    runs-on: ubuntu-latest
    steps:
      - continue-on-error: true
        id: createGithubAppToken
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.OPERATOR_APP_ID }}
          permission-contents: read
          private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN }}
      - run: nix run nixpkgs#direnv allow
      - run: nix run nixpkgs#direnv export gha >> "$GITHUB_ENV"
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --recursive build
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - continue-on-error: true
        id: createGithubAppToken
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.OPERATOR_APP_ID }}
          permission-contents: read
          private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN }}
      - run: nix run nixpkgs#direnv allow
      - run: nix run nixpkgs#direnv export gha >> "$GITHUB_ENV"
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --recursive check
name: JavaScript
'on':
  workflow_call:
    inputs:
      node-version:
        default: lts/*
        type: string
    secrets:
      OPERATOR_PRIVATE_KEY:
        required: true
permissions:
  contents: read
